<div class="flex justify-center px-4 py-8">
  <div class="w-full max-w-2xl">
    <div class="mb-6">
      <a [routerLink]="['/', owner(), repoName(), 'pulls']" class="btn btn-ghost btn-sm gap-1.5">
        <lucide-icon name="arrowLeft" class="size-4"></lucide-icon>
        Back to pull requests
      </a>
    </div>

    <div class="card bg-base-100 border-base-300 overflow-hidden border shadow-lg">
      <div class="card-body p-8">
        <h1 class="text-base-content text-2xl font-bold">New pull request</h1>
        <p class="text-base-content/70 mt-1 mb-8">
          Create a pull request to propose changes from one branch into another.
        </p>

        <form class="space-y-6" (ngSubmit)="onSubmit()">
          <div class="form-control">
            <label class="label" for="pr-title">
              <span class="label-text font-medium">Title</span>
            </label>
            <input
              id="pr-title"
              type="text"
              class="input input-bordered w-full"
              placeholder="e.g. Fix bug in login flow"
              [ngModel]="title()"
              (ngModelChange)="title.set($event)"
              name="title"
              required
            />
          </div>

          <div class="form-control">
            <label class="label" for="pr-description">
              <span class="label-text font-medium">Description</span>
              <span class="label-text-alt text-base-content/50">Optional</span>
            </label>
            <textarea
              id="pr-description"
              class="textarea textarea-bordered min-h-32 w-full"
              placeholder="Describe your changes, link related issues..."
              [ngModel]="description()"
              (ngModelChange)="description.set($event)"
              name="description"
            ></textarea>
          </div>

          <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
            <div class="form-control">
              <label class="label" for="pr-base-branch">
                <span class="label-text font-medium">Base branch</span>
              </label>
              <select
                id="pr-base-branch"
                class="select select-bordered w-full"
                [ngModel]="targetBranch()"
                (ngModelChange)="targetBranch.set($event)"
                name="targetBranch"
              >
                @for (b of branches(); track b.name) {
                <option [value]="b.name" [selected]="b.name === targetBranch()">{{ b.name }}</option>
                } @if (branches().length === 0) {
                <option [value]="defaultBranch()">{{ defaultBranch() }}</option>
                }
              </select>
            </div>
            <div class="form-control">
              <label class="label" for="pr-compare-branch">
                <span class="label-text font-medium">Compare branch</span>
              </label>
              <select
                id="pr-compare-branch"
                class="select select-bordered w-full"
                [ngModel]="sourceBranch()"
                (ngModelChange)="sourceBranch.set($event)"
                name="sourceBranch"
              >
                @for (b of branches(); track b.name) {
                <option [value]="b.name" [selected]="b.name === sourceBranch()">{{ b.name }}</option>
                } @if (branches().length === 0) {
                <option [value]="defaultBranch()">{{ defaultBranch() }}</option>
                }
              </select>
            </div>
          </div>

          <div class="bg-base-200/50 border-base-300 flex items-center gap-3 rounded-lg border p-4">
            <input
              id="pr-draft"
              type="checkbox"
              class="checkbox checkbox-primary checkbox-sm"
              [ngModel]="isDraft()"
              (ngModelChange)="isDraft.set($event)"
              name="isDraft"
            />
            <label class="label flex-1 cursor-pointer py-0" for="pr-draft">
              <span class="label-text font-medium">Create as draft</span>
              <span class="label-text-alt text-base-content/60">Draft PRs can't be merged until marked ready</span>
            </label>
          </div>

          <div class="flex flex-wrap gap-3 pt-2">
            <button type="submit" class="btn btn-primary gap-2" [disabled]="!title().trim() || submitting()">
              @if (submitting()) {
              <span class="loading loading-spinner loading-sm"></span>
              } @else {
              <lucide-icon name="git-pull-request" [size]="16"></lucide-icon>
              Create pull request }
            </button>
            <a [routerLink]="['/', owner(), repoName(), 'pulls']" class="btn btn-ghost">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
